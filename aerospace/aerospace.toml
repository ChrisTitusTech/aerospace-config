# Reference: https://github.com/i3/i3/blob/next/etc/config
# Reference: https://github.com/adriankarlen/dots/blob/main/.config/aerospace/aerospace.toml

config-version = 2

# i3 doesn't have "normalizations" feature, which is why we disable them here.
# But the feature is very helpful.
# Normalizations eliminate all sorts of weird tree configurations that don't make sense.
# Give normalizations a chance and enable them back.
start-at-login = true
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false
after-login-command = []

# Wide monitors use horizontal tiling, tall monitors use vertical
default-root-container-orientation = 'auto'

# Padding shown in accordion layouts to indicate more windows exist
accordion-padding = 30

# Mouse follows focused monitor (essential for multi-monitor)
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Prevent cmd-h from hiding windows out of AeroSpace's sight
automatically-unhide-macos-hidden-apps = true

# Keep workspaces alive even when empty
persistent-workspaces = ['1', '2', '3', '4', '5', '6', '7', '8']

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = [
    # JankyBorders has a built-in detection of already running process,
    # so it won't be run twice on AeroSpace restart
    'exec-and-forget /opt/homebrew/opt/sketchybar/bin/sketchybar',
]

exec-on-workspace-change = [
    '/bin/bash',
    '-c',
    '/opt/homebrew/opt/sketchybar/bin/sketchybar --trigger aerospace_workspace_change AEROSPACE_FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE AEROSPACE_PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE',
]

[key-mapping]
    preset = 'qwerty'

[workspace-to-monitor-force-assignment]
1 = 1
2 = 1
3 = 1
4 = 1
5 = [2, 1]
6 = [2, 1]
7 = [3, 2, 1]
8 = [3, 2, 1]

[gaps]
inner.horizontal = 5
inner.vertical = 5
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[mode.main.binding]
    # Launch Terminal
    alt-enter = '''exec-and-forget osascript -e '
    tell application "Terminal"
        do script
        activate
    end tell'
    '''

    # Focus
    alt-h = 'focus --boundaries-action wrap-around-the-workspace left'
    alt-j = 'focus --boundaries-action wrap-around-the-workspace down'
    alt-k = 'focus --boundaries-action wrap-around-the-workspace up'
    alt-l = 'focus --boundaries-action wrap-around-the-workspace right'

    # Move
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # Split / layout
    alt-g = 'split horizontal'
    alt-v = 'split vertical'
    alt-f = 'fullscreen'
    alt-s = 'layout v_accordion' # 'layout stacking' in i3
    alt-w = 'layout h_accordion' # 'layout tabbed' in i3
    alt-e = 'layout tiles horizontal vertical' # 'layout toggle split' in i3
    alt-shift-space = 'layout floating tiling' # 'floating toggle' in i3

    # Workspaces
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'

    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # Monitor focus
    alt-ctrl-h = 'focus-monitor left'
    alt-ctrl-l = 'focus-monitor right'

    # Move window to adjacent monitor
    alt-ctrl-shift-h = 'move-node-to-monitor --wrap-around left'
    alt-ctrl-shift-l = 'move-node-to-monitor --wrap-around right'

    # Misc
    alt-shift-f = 'macos-native-fullscreen'
    alt-shift-c = 'reload-config'
    alt-shift-semicolon = 'mode service'

    # Resize
    alt-minus = 'resize smart -70'
    alt-equal = 'resize smart +70'
    alt-r = 'mode resize'

# App assignments by workspace
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = [
    'layout floating',
    'move-node-to-workspace 3',
]

[[on-window-detected]]
if.app-id = 'com.seriflabs.affinityphoto2'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.apple.FinalCut'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.github.GitHubClient'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.github.th-ch.youtube-music'
run = 'move-node-to-workspace 5'

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace 5'

# Floating app rules
[[on-window-detected]]
if.app-name-regex-substring = 'finder'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'IINA'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'numi'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'pixea'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'tlauncher'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'net.whatsapp.WhatsApp'
run = 'layout floating'

[mode.resize.binding]
    h = 'resize width -50'
    j = 'resize height +50'
    k = 'resize height -50'
    l = 'resize width +50'
    enter = 'mode main'
    esc = 'mode main'

[mode.service.binding]
    esc = 'mode main'
    r = ['flatten-workspace-tree', 'mode main'] # Reset layout
    f = ['layout floating tiling', 'mode main']  # Toggle floating
    backspace = ['close-all-windows-but-current', 'mode main']

    # Join focused window with neighbour into a shared container
    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']
